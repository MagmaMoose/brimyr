site_name: Brimyr
site_description: >-
  Patch-coverage gate — auto-detect the ecosystem, run tests with coverage, and
  gate on the coverage of the lines a PR changed (diff-cover style).
repo_url: https://github.com/MagmaMoose/brimyr
repo_name: MagmaMoose/brimyr
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Patch coverage: patch-coverage.md
  - Setup & usage: setup.md
  - CLI reference: cli.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - toc:
      permalink: true
